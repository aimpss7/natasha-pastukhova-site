<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Работы — Наталья Пастухова</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header">
        <a href="index.html" class="header-logo">
            Наташа Пастухова<span class="heart">♥</span>
        </a>
        <div class="header-menu">
            <a href="about.html">О Наташе</a>
            <a href="index.html#shop">Магазин</a>
        </div>
        <div class="header-lang">
            <span class="lang-toggle" onclick="toggleLanguage()">RU</span>
        </div>
    </div>

    <section class="projects-hero">
        <h1>Работы</h1>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="Мурал">Муралы</button>
            <button class="filter-btn" data-filter="Инсталляция">Инсталляции</button>
        </div>
    </section>

    <div class="container" id="projects-grid">
        <!-- Карточки проектов рендерятся через JS -->
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="footer-col">Наташа Пастухова<br>2026</div>
            <div class="footer-col">Наташа Пастухова - супер-пупер художница</div>
            <div class="footer-col"><a href="mailto:Natasha@pochta.ru">Natasha@pochta.ru</a></div>
            <div class="footer-col">
                <a href="https://www.behance.net/hellopepe" target="_blank">Биханс</a>
                <a href="https://www.instagram.com/hellopepe" target="_blank">Инстаграм</a>
            </div>
            <div class="footer-col"><a href="about.html">О Наташе</a></div>
            <div class="footer-col">
                <div>Екатеринбург</div>
                <div class="ekb-time" id="ekb-time">00:00:00</div>
                <div class="ekb-weather" id="weather-temp">--°C</div>
            </div>
        </div>
    </div>

    <script>
        // ── Встроенные данные (резервный вариант для file:// протокола) ──
        const FALLBACK_PROJECTS = [
            {
                id: "project-1",
                name: "Все мои друзья",
                year: 2024,
                category: "Мурал",
                cover: "1а.png",
                url: "projects/project-1/",
                location: "Екатеринбург",
                desc: "Мурал создан в рамках фестиваля «Стенограффия».",
                rotation: -0.2192
            },
            {
                id: "project-2",
                name: "Название проекта 2",
                year: 2020,
                category: "Мурал",
                cover: "assets/images/project-2.svg",
                url: "projects/project-2/",
                location: "Город",
                desc: "Описание проекта 2.",
                rotation: 0.0958
            }
        ];

        // ── Загрузка данных: сначала fetch, при ошибке — встроенные данные ──
        async function loadProjects() {
            try {
                const response = await fetch('assets/data/projects.json');
                if (!response.ok) throw new Error('Network error');
                return await response.json();
            } catch (e) {
                // Fallback для file:// протокола (Chrome блокирует fetch к локальным файлам)
                return FALLBACK_PROJECTS;
            }
        }

        // Убираем ведущий / для совместимости с file:// протоколом
        function fixPath(p) {
            if (!p) return p;
            return (location.protocol === 'file:') ? p.replace(/^\//, '') : p;
        }

        // ── Рендер карточек в сетку (чередование рядов 3–2–3–2) ──
        function renderProjects(projects) {
            const container = document.getElementById('projects-grid');
            if (!projects || !projects.length) {
                container.innerHTML = '<p style="padding:40px;color:#666;">Проекты не найдены.</p>';
                return;
            }

            const rowPattern = [3, 2];
            let html = '';
            let i = 0;
            let patternIndex = 0;

            while (i < projects.length) {
                const size = Math.min(rowPattern[patternIndex % rowPattern.length], projects.length - i);
                const row = projects.slice(i, i + size);

                html += `<div class="row row-${size}">`;
                row.forEach(p => {
                    const rot   = (p.rotation || 0).toFixed(4);
                    const title = p.name || p.title || '';
                    const img   = fixPath(p.cover || p.image || '');
                    const url   = fixPath(p.url);

                    if (url) {
                        html += `
                        <a href="${url}" class="card">
                            <div class="card-img" style="--base-rotation: ${rot}deg;">
                                <img src="${img}" alt="${title}">
                            </div>
                            <h3>${title}</h3>
                        </a>`;
                    } else {
                        html += `
                        <div class="card">
                            <div class="card-img" style="--base-rotation: ${rot}deg;">
                                <img src="${img}" alt="${title}">
                            </div>
                            <h3>${title}</h3>
                        </div>`;
                    }
                });
                html += '</div>';

                i += size;
                patternIndex++;
            }

            container.innerHTML = html;
        }

        // ── Фильтрация карточек ──
        function initFilters(projects) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.dataset.filter;
                    const filtered = filter === 'all'
                        ? projects
                        : projects.filter(p => p.category === filter);
                    renderProjects(filtered);
                });
            });
        }

        // ── Инициализация страницы ──
        loadProjects().then(projects => {
            renderProjects(projects);
            initFilters(projects);
        });
    </script>

    <script defer src="js/main.js"></script>

</body>
</html>
